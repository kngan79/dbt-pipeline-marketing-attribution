version: 2

models:
  - name: stg_orders
    description: "Staged order transactions with masked customer emails."
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'failed']

  - name: stg_fb_spend
    description: "Staged Facebook Ads daily spend."
    columns:
      - name: campaign_id
        tests:
          - not_null

  - name: stg_google_spend
    description: "Staged Google Ads daily spend."
    columns:
      - name: campaign_id
        tests:
          - not_null

  - name: stg_attribution
    description: "Staged campaign and channel attribution mapping for orders."
    columns:
      - name: order_id
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
